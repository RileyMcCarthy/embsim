name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build + unit/integration tests + doctests on both supported platforms.
  # The whole workspace is firmware-free: every crate tests standalone. The
  # memory-inspect DWARF tests compile a C fixture with clang (preferred; the
  # parser targets clang-emitted DWARF) and skip gracefully without a C
  # toolchain.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all targets)
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Doc tests
        run: cargo test --workspace --doc
      # Feature-matrix leg: the default build has embsim-trace's `web` feature
      # on (axum + tokio + embsim-ui). Exercise the headless recorder path with
      # the web feature OFF so it can't silently rot.
      - name: Build embsim-trace (web off)
        run: cargo build -p embsim-trace --no-default-features
      - name: Test embsim-trace (web off)
        run: cargo test -p embsim-trace --no-default-features
      # Timing-sensitive paths (serial baud pacing, pulse_out integration,
      # board stream pacing) can differ under optimisations — smoke them in
      # release on the ubuntu leg only (macOS already ran debug).
      - name: Release smoke (peripherals + board)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p embsim-peripherals -p embsim-board --release

  # Line/region coverage report (soft gate). Publishes a job summary; does not
  # fail on threshold yet — see coverage-baseline.txt and TESTING.md. Installs
  # cargo-llvm-cov + llvm-tools so `cargo llvm-cov` works out of the box.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage summary
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --summary-only 2>&1 | tee coverage-summary.txt
          {
            echo "## Coverage (soft gate — no threshold fail)"
            echo '```'
            tail -40 coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embsim-lcov-${{ github.run_number }}
          path: lcov.info
          retention-days: 14

  # Both rustfmt and clippy are gating. The lint backlog has been cleared, so
  # clippy runs with `-D warnings` — any new lint fails the build. The few
  # unavoidable lints (interior-mutable const array seeds, await-holding-lock in
  # single-threaded tests, an intentional enum prefix) carry item-scoped
  # `#[allow(...)]`s with `// justification:` comments; no crate-level blanket
  # allows are used.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (gating)
        run: cargo fmt --all --check
      - name: clippy (gating)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # API docs must build without warnings (broken intra-doc links, etc.).
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (deny warnings)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Supply-chain audit: RustSec advisories + license allow-list (see deny.toml).
  # Vulnerabilities, unmaintained/unsound/yanked crates, disallowed licenses, or
  # unknown sources all fail the build.
  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # MSRV guard: the workspace pins rust-version = 1.88 (gimli 0.34). Build only
  # — MSRV governs compilation, not test/runtime behavior.
  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Build (workspace) on MSRV
        run: cargo build --workspace
