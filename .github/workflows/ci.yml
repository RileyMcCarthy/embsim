name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build + unit/integration tests + doctests on both supported platforms.
  # The whole workspace is firmware-free: every crate tests standalone. The
  # memory-inspect DWARF tests compile a C fixture with clang (preferred; the
  # parser targets clang-emitted DWARF) and skip gracefully without a C
  # toolchain.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all targets)
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Doc tests
        run: cargo test --workspace --doc

  # rustfmt is gating (the tree is formatted); clippy is advisory until the
  # pre-existing lint backlog is cleared — promote it by appending
  # `-- -D warnings` once `cargo clippy` is clean.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (gating)
        run: cargo fmt --all --check
      - name: clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets

  # API docs must build without warnings (broken intra-doc links, etc.).
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (deny warnings)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
